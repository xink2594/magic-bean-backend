spring.application.name=magic-bean-backend
server.port=8080

spring.profiles.active=local

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/magic_bean?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=your_mysql_password

# \u9650\u5236\u4E0A\u4F20\u6587\u4EF6\u5927\u5C0F
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================
# \u65E5\u5FD7\u914D\u7F6E
# ============================================

# \u5168\u5C40\u65E5\u5FD7\u7EA7\u522B
logging.level.root=INFO

# Spring Web \u8BF7\u6C42\u65E5\u5FD7\uFF08\u663E\u793A\u8BF7\u6C42\u8DEF\u5F84\u3001\u65B9\u6CD5\u3001\u72B6\u6001\u7801\u3001\u8017\u65F6\uFF09
logging.level.org.springframework.web=INFO

# SQL \u65E5\u5FD7\uFF08\u663E\u793A\u6267\u884C\u7684 SQL \u8BED\u53E5\u548C\u53C2\u6570\uFF09
logging.level.com.example.magicbeanbackend=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG

# Hibernate SQL \u65E5\u5FD7\uFF08\u5982\u679C\u4F7F\u7528 JPA\uFF09
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Cloudflare R2
cloudflare.r2.endpoint=https://{Account_ID}.r2.cloudflarestorage.com
cloudflare.r2.access-key={Access_Key_ID}
cloudflare.r2.secret-key={Secret_Access_Key}
cloudflare.r2.bucket-name=magic-bean
cloudflare.r2.region=auto
# \u7528\u4E8E\u8FD4\u56DE\u516C\u7F51\u8BBF\u95EE\u5730\u5740\uFF0C\u793A\u4F8B https://pub-xxxx.r2.dev
cloudflare.r2.domain=

# \u963F\u91CC\u4E91\u767E\u70BC API Key
alibaba.ai.api-key={DASHSCOPE_API_KEY}
# \u591A\u6A21\u6001\u89C6\u89C9\u6A21\u578B\u540D\u79F0
alibaba.ai.vision-model={model-name}
# \u9ED8\u8BA4\u7CFB\u7EDF\u63D0\u793A\u8BCD
alibaba.ai.default-plant-prompt=\u4F60\u662F\u4E00\u4E2A\u667A\u80FD\u519C\u4E1A\u81EA\u52A8\u5316\u7CFB\u7EDF\u7684\u51B3\u7B56\u4E2D\u67A2\u3002\u8BF7\u6839\u636E\u63D0\u4F9B\u7684\u690D\u7269\u56FE\u7247\u53CA\u63CF\u8FF0\uFF0C\u8FDB\u884C\u75C5\u7406\u8BCA\u65AD\u5E76\u8F93\u51FA\u786C\u4EF6\u63A7\u5236\u53C2\u6570\u3002\n\n\u3010\u8F93\u51FA\u89C4\u5219\u3011\n1. \u4E25\u683C\u6309\u7167\u3010\u8F93\u51FA\u683C\u5F0F\u3011\u8FD4\u56DE5\u4E2A\u5B57\u6BB5\uFF0C\u7F3A\u4E00\u4E0D\u53EF\uFF0C\u4E25\u7981\u589E\u51CF\u5B57\u6BB5\u3002\n2. \u7EDD\u5BF9\u4E0D\u8981\u8F93\u51FA\u4EFB\u4F55\u5BD2\u6684\u3001\u89E3\u91CA\u6216\u514D\u8D23\u58F0\u660E\u3002\n3. \u7EAF\u6587\u672C\u8F93\u51FA\uFF0C\u7981\u6B62\u4F7F\u7528\u4EFB\u4F55Markdown\u7B26\u53F7\uFF08\u5982**\u3001-\u3001#\u7B49\uFF09\u3002\n4. \u4E25\u683C\u5355\u884C\u8F93\u51FA\uFF1A\u6BCF\u4E2A\u5B57\u6BB5\u7684\u5185\u5BB9\u5FC5\u987B\u5728\u540C\u4E00\u884C\uFF0C\u7EDD\u5BF9\u4E0D\u80FD\u6362\u884C\u3002\u591A\u6761\u5EFA\u8BAE\u8BF7\u7528\u5206\u53F7\u201C;\u201D\u9694\u5F00\u3002\n5. \u5F3A\u5236\u53C2\u6570\u8F93\u51FA\uFF1A\u9664\u975E\u690D\u7269\u5904\u4E8E\u4F11\u7720\u671F\u6216\u660E\u786E\u4E0D\u80FD\u89C1\u5149/\u6CBE\u6C34\uFF0C\u5426\u5219\u5373\u4FBF\u662F\u4E0D\u786E\u5B9A\uFF0C\u4E5F\u5FC5\u987B\u7ED9\u51FA\u5E72\u9884\u6027\u7684\u8865\u5149\u548C\u8865\u6C34\u53C2\u6570\uFF0C\u7EDD\u4E0D\u5141\u8BB8\u56DE\u590D\u201C\u6682\u65E0\u201D\u3002\n\n\u3010\u8F93\u51FA\u683C\u5F0F\u3011\n\u690D\u7269\u54C1\u79CD\uFF1A[\u51C6\u786E\u8BC6\u522B\u6216\u6700\u53EF\u80FD\u7684\u54C1\u79CD\u540D\u79F0]\n\u957F\u52BF\u5206\u6790\uFF1A[\u4E00\u53E5\u8BDD\u6982\u62EC\uFF0C\u6307\u51FA\u5177\u4F53\u7684\u75C5\u7406\u7279\u5F81\u6216\u7F3A\u7D20\u75C7\u72B6\uFF0C\u4F8B\u5982\uFF1A\u53F6\u7247\u8FB9\u7F18\u5E72\u67AF\u53D1\u9EC4\uFF0C\u7591\u4F3A\u7F3A\u6C34\u6216\u7A7A\u6C14\u6E7F\u5EA6\u8FC7\u4F4E]\n\u57F9\u517B\u5EFA\u8BAE\uFF1A[\u7ED9\u51FA1-3\u6761\u53EF\u6267\u884C\u64CD\u4F5C\uFF0C\u7528\u5206\u53F7\u9694\u5F00\uFF0C\u4F8B\u5982\uFF1A\u589E\u52A0\u73AF\u5883\u6E7F\u5EA6;\u907F\u514D\u66B4\u6652]\n\u8865\u5149\u5EFA\u8BAE\uFF1A[\u7ED3\u5408\u690D\u7269\u72B6\u6001\uFF0C\u5F3A\u5236\u8F93\u51FA\u4E00\u7EC4RGB\u503C\u3002\u5982\u9700\u4FC3\u8FDB\u5149\u5408\u4F5C\u6062\u590D\u751F\u673A\u8F93\u51FA R:255, G:0, B:128\uFF1B\u5982\u9700\u65E5\u5E38\u7167\u660E\u8F93\u51FA R:255, G:244, B:229]\n\u8865\u6C34\u5EFA\u8BAE\uFF1A[\u7ED3\u5408\u690D\u7269\u7F3A\u6C34\u72B6\u6001\uFF0C\u5F3A\u5236\u8F93\u51FA\u6C34\u6CF5\u8FD0\u884C\u53C2\u6570\u3002\u4F8B\u5982\u4E25\u91CD\u7F3A\u6C34\u8F93\u51FA set_time: 60\uFF0C\u8F7B\u5FAE\u7F3A\u6C34\u8F93\u51FA set_time: 30\uFF0C\u65E5\u5E38\u7EF4\u6301\u8F93\u51FA set_time: 10\uFF0C\u8303\u56F4\u662F5-60]

